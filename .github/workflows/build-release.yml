name: Build and Release Binaries

on:
  release:
    types: [created, edited]
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x86, x64]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v1
        with:
          cmake-version: '3.27'
      
      - name: Create build directory
        run: mkdir build
      
      - name: Configure CMake
        run: cmake -A ${{ matrix.arch == 'x86' && 'Win32' || 'x64' }} -B build -S .
      
      - name: Build
        run: cmake --build build --config Release
      
      - name: Prepare artifacts
        run: |
          mkdir -p artifacts/windows-${{ matrix.arch }}
          copy build/Release/TheiaMCR_C.dll artifacts/windows-${{ matrix.arch }}/
          copy build/Release/TheiaMCR_C.lib artifacts/windows-${{ matrix.arch }}/
          xcopy include artifacts/windows-${{ matrix.arch }}/include /E /I
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-binaries
          path: artifacts/

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential
      
      - name: Create build directory
        run: mkdir build
      
      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
        if: matrix.arch == 'x64'
      
      - name: Configure CMake (ARM64)
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DCMAKE_SYSTEM_PROCESSOR=aarch64
        if: matrix.arch == 'arm64'
      
      - name: Build
        run: cmake --build build
      
      - name: Prepare artifacts
        run: |
          mkdir -p artifacts/linux-${{ matrix.arch }}
          cp build/libTheiaMCR_C.so artifacts/linux-${{ matrix.arch }}/
          cp -r include artifacts/linux-${{ matrix.arch }}/
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}-binaries
          path: artifacts/

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
      
      - name: Create release archives
        run: |
          cd all-artifacts
          zip -r ../TheiaMCR_C-windows-x86.zip windows-x86-binaries/
          zip -r ../TheiaMCR_C-windows-x64.zip windows-x64-binaries/
          zip -r ../TheiaMCR_C-linux-x64.zip linux-x64-binaries/
          zip -r ../TheiaMCR_C-linux-arm64.zip linux-arm64-binaries/
      
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            TheiaMCR_C-windows-x86.zip
            TheiaMCR_C-windows-x64.zip
            TheiaMCR_C-linux-x64.zip
            TheiaMCR_C-linux-arm64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
