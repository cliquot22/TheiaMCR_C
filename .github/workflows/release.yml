name: Release Package

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build & Package (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build Library
        run: cmake --build build --config Release

      - name: List build output
        run: |
          dir build\Release || dir build

      - name: Create Release Package
        shell: pwsh
        run: |
          $Version = "${{ github.ref_name }}".TrimStart('v')
          $PackageDir = "theiaMCR_C-v$Version-windows-x64"
          New-Item -ItemType Directory -Path "$PackageDir/lib" -Force
          New-Item -ItemType Directory -Path "$PackageDir/include" -Force
          Copy-Item -Path "include/*" -Destination "$PackageDir/include" -Recurse
          $dll = Get-ChildItem -Recurse -Filter "TheiaMCR_C.dll" | Select-Object -First 1
          $lib = Get-ChildItem -Recurse -Filter "TheiaMCR_C.lib" | Select-Object -First 1
          if ($dll) { Copy-Item $dll.FullName "$PackageDir/lib/" }
          if ($lib) { Copy-Item $lib.FullName "$PackageDir/lib/" }
          Compress-Archive -Path $PackageDir -DestinationPath "$PackageDir.zip"

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: theiaMCR_C-*-windows-x64.zip

  build-linux:
    name: Build & Package (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential zip

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build Library
        run: cmake --build build --config Release

      - name: Create Release Package
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          PACKAGE_DIR="theiaMCR_C-v${VERSION}-linux-x64"
          mkdir -p "$PACKAGE_DIR/lib"
          mkdir -p "$PACKAGE_DIR/include"
          cp -r include/* "$PACKAGE_DIR/include/"
          find build -name "libTheiaMCR_C.so*" -exec cp {} "$PACKAGE_DIR/lib/" \;
          zip -r "${PACKAGE_DIR}.zip" "$PACKAGE_DIR"

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifact
          path: theiaMCR_C-*-linux-x64.zip

  create-github-release:
    name: Create GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Source Package
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          SRC_DIR="theiaMCR_C-v${VERSION}-source"
          mkdir -p "$SRC_DIR"
          cp -r src include CMakeLists.txt README.md LICENSE "$SRC_DIR/"
          zip -r "${SRC_DIR}.zip" "$SRC_DIR"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows-artifact/theiaMCR_C-*-windows-x64.zip
            artifacts/linux-artifact/theiaMCR_C-*-linux-x64.zip
            theiaMCR_C-*-source.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
