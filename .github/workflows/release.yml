name: Release Package

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    name: Build & Package Release
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Python (for dependencies/testing)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libspdlog-dev build-essential zip
          
      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -S . -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build Library (Release)
        run: |
          cmake --build build --config Release

      - name: Create Release Packages (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Version = "${{ github.ref_name }}".TrimStart('v')
          $PackageDir = "theiaMCR_C-v$Version-windows-x64"
          New-Item -ItemType Directory -Path $PackageDir
          New-Item -ItemType Directory -Path "$PackageDir/lib"
          New-Item -ItemType Directory -Path "$PackageDir/include"
          
          # Copy headers
          Copy-Item -Path "include/*" -Destination "$PackageDir/include" -Recurse
          
          # Copy library binaries
          Copy-Item -Path "build/Release/TheiaMCR_C.dll" -Destination "$PackageDir/lib/"
          Copy-Item -Path "build/Release/TheiaMCR_C.lib" -Destination "$PackageDir/lib/"
          
          # Create zip archive
          Compress-Archive -Path $PackageDir -DestinationPath "$PackageDir.zip"
          Move-Item -Path "$PackageDir.zip" -Destination "."

      - name: Create Release Packages (Linux)
        if: runner.os == 'Linux'
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          PACKAGE_DIR="theiaMCR_C-v${VERSION}-linux-x64"
          mkdir -p "$PACKAGE_DIR/lib"
          mkdir -p "$PACKAGE_DIR/include"
          
          # Copy headers
          cp -r include/* "$PACKAGE_DIR/include/"
          
          # Copy library binaries
          cp build/libTheiaMCR_C.so "$PACKAGE_DIR/lib/"
          
          # Create zip archive
          zip -r "${PACKAGE_DIR}.zip" "$PACKAGE_DIR"

      - name: Upload Binary Artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: theiaMCR_C-*-windows-x64.zip

      - name: Upload Binary Artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifact
          path: theiaMCR_C-*-linux-x64.zip

  create-github-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Source Package
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          SRC_DIR="theiaMCR_C-v${VERSION}-source"
          mkdir -p "$SRC_DIR"
          
          # Copy source directories and core configuration files
          cp -r src "$SRC_DIR/"
          cp -r include "$SRC_DIR/"
          cp CMakeLists.txt "$SRC_DIR/"
          cp README.md "$SRC_DIR/"
          cp LICENSE "$SRC_DIR/"
          
          # Zip source directory
          zip -r "${SRC_DIR}.zip" "$SRC_DIR"

      - name: Create and Upload Assets to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows-artifact/theiaMCR_C-*-windows-x64.zip
            artifacts/linux-artifact/theiaMCR_C-*-linux-x64.zip
            theiaMCR_C-*-source.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: *** secrets.GITHUB_TOKEN }}
